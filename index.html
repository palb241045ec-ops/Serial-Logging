<!DOCTYPE html>
<html>
<head>
    <title>Wi-Fi Sensor Dashboard</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Wi-Fi Sensor Dashboard</h1>

    <div class="cards">
        <div class="card">
            <h2>Temperature</h2>
            <p id="temperature" class="value">-- °C</p>
        </div>

        <div class="card">
            <h2>Humidity</h2>
            <p id="humidity" class="value">-- %</p>
        </div>
    </div>

    <p class="timestamp">
        Last Updated: <span id="time">--</span>
    </p>

    <h2 class="history-title">Recent Readings</h2>

    <table id="historyTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>Temperature (°C)</th>
                <th>Humidity (%)</th>
            </tr>
        </thead>
        <tbody>
        </tbody>
    </table>
</div>

<script src="script.js"></script>
</body>
</html>
